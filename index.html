<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keep Alive ImageKit - Zoomable</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
      margin: 0;
    }

    h2 { margin-bottom: 5px; }
    p { color: #555; font-size: 14px; margin-bottom: 20px; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }

    .image-item {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .image-item:hover {
      transform: scale(1.03);
    }

    /* --- Style untuk Modal Zoom --- */
    .modal {
      display: none; /* Sembunyi secara default */
      position: fixed;
      z-index: 1000;
      padding-top: 50px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
      cursor: zoom-out;
    }

    .modal-content {
      margin: auto;
      display: block;
      width: 80%;
      max-width: 700px;
      border-radius: 8px;
      animation: zoomIn 0.3s;
    }

    @keyframes zoomIn {
      from {transform: scale(0)} 
      to {transform: scale(1)}
    }

    /* Tombol Close */
    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    @media (min-width: 600px) {
      .image-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <h2>TIUS</h2>
  

  <div class="image-grid">
     <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165252_pUijYg3Yd.jpg?updatedAt=1755141364051" onclick="openModal(this.src)">
    <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165250_4AfrcnKa3.jpg?updatedAt=1755140508083" onclick="openModal(this.src)">
      <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165257_P9VT6q8O6.jpg?updatedAt=1755141423278" onclick="openModal(this.src)">
    <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165251_vxOUz6M5y.jpg?updatedAt=1755141341849" onclick="openModal(this.src)">
      <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165242_XDox94A_4.jpg?updatedAt=1755141209730" onclick="openModal(this.src)">
    <img class="image-item" src="https://ik.imagekit.io/3gmd2jdn4/1000165245_VNUZFAV8S.jpg?updatedAt=1755140910433" onclick="openModal(this.src)">
  </div>

  <div id="myModal" class="modal" onclick="this.style.display='none'">
    <span class="close">&times;</span>
    <img class="modal-content" id="imgZoom">
  </div>

  <script>
    function openModal(src) {
      document.getElementById("myModal").style.display = "block";
      document.getElementById("imgZoom").src = src;
    }
  </script>

</body>
</html>
